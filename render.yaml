services:
  # Single Unified Web Service (runs Backend, Celery, and Streamlit in one container)
  - type: web
    name: askdocx-app
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    buildCommand: ""
    # Defaults to CMD ["./run.sh"] inside Dockerfile
    plan: free
    envVars:
      - fromGroup: askdocx-env

envVarGroups:
  - name: askdocx-env
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: askdocx